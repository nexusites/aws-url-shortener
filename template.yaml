AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless URL Shortener — API Gateway + Lambda + DynamoDB
  All resources stay within the AWS Free Tier for the first 12 months.

Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]

Globals:
  Function:
    Runtime: python3.12
    MemorySize: 128
    Timeout: 10
    Environment:
      Variables:
        TABLE_NAME: !Ref UrlTable
        BASE_URL: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"

Resources:

  # ── DynamoDB Table ────────────────────────────────────────────────────────
  UrlTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "url-shortener-${Stage}"
      BillingMode: PAY_PER_REQUEST          # on-demand — free tier 25 WCU/RCU included
      AttributeDefinitions:
        - AttributeName: short_code
          AttributeType: S
      KeySchema:
        - AttributeName: short_code
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true                        # auto-delete expired items, no extra cost

  # ── Lambda Functions ──────────────────────────────────────────────────────
  UrlShortenerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "url-shortener-${Stage}"
      CodeUri: ../src/
      Handler: handler.lambda_handler
      Description: "Handles POST /shorten, GET /r/{code}, GET /stats/{code}"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UrlTable
      Events:
        Shorten:
          Type: Api
          Properties:
            Path: /shorten
            Method: POST
        Redirect:
          Type: Api
          Properties:
            Path: /r/{code}
            Method: GET
        Stats:
          Type: Api
          Properties:
            Path: /stats/{code}
            Method: GET

  # ── CloudWatch Alarms ────────────────────────────────────────────────────
  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "url-shortener-${Stage}-errors"
      AlarmDescription: "Lambda error rate > 5 in 5 minutes"
      MetricName: Errors
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref UrlShortenerFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold

Outputs:
  ApiEndpoint:
    Description: "Base URL for the API"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}"
  TableName:
    Description: "DynamoDB table name"
    Value: !Ref UrlTable
  FunctionArn:
    Description: "Lambda function ARN"
    Value: !GetAtt UrlShortenerFunction.Arn
